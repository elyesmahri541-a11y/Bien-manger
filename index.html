<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Détecteur de Polémiques d'Arbitrage</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 14px; background-color: #0f172a; border: 2px solid #334155; border-radius: 8px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: #38bdf8; outline: none; }
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        
        /* Styles de la barre de progression */
        .progress-container { display: none; margin-top: 20px; background-color: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .progress-text { text-align: center; margin-bottom: 8px; font-weight: bold; color: #38bdf8; font-size: 14px; }
        .progress-bar-bg { width: 100%; background-color: #334155; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fill { width: 0%; background-color: #38bdf8; height: 100%; transition: width 0.1s ease; }

        .results-section { margin-top: 30px; }
        .link-card { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #f43f5e; transition: transform 0.2s; }
        .link-card:hover { transform: translateX(5px); }
        .link-card a { color: #38bdf8; font-weight: bold; text-decoration: none; font-size: 18px; }
        .link-card p { margin: 5px 0 0 0; font-size: 14px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Traqueur de Litiges d'Arbitrage</h1>
    <p class="subtitle">Colle un lien Flashscore pour trouver toutes les polémiques du match sur le web</p>

    <input type="text" id="urlInput" placeholder="Colle le lien Flashscore ici... (ex: https://www.flashscore.fr/r/?t=1&id=jTzDOtLE)">
    <button onclick="chercherPolemiques()">Scanner le Web</button>

    <div class="progress-container" id="progressArea">
        <div class="progress-text" id="progressLabel">Initialisation... 0/100</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="results-section" id="results"></div>
</div>

<script>
// --- CONFIGURATION GRATUITE DE TON MOTEUR DE RECHERCHE ---
// Remplace ces valeurs par tes clés gratuites obtenues sur Google 
const GOOGLE_API_KEY = "TA_CLE_API_GOOGLE_ICI"; 
const GOOGLE_CX = "TON_ID_DE_MOTEUR_DE_RECHERCHE_ICI"; 

// Cette fonction analyse l'URL, extrait l'ID de match si présent et tente de trouver les équipes
async function obtenirEquipes(url) {
    try {
        const urlObj = new URL(url);
        
        // 1. GESTION DU FORMAT COURT : /r/?t=1&id=jTzDOtLE
        const idMatch = urlObj.searchParams.get('id');
        if (idMatch) {
            // On utilise un service proxy gratuit pour interroger l'API publique de Flashscore afin de récupérer les détails du match
            // Ce proxy permet d'éviter les blocages de sécurité (CORS) directement depuis ton navigateur 
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://local-services.flashscore.com/xml/fr/x/feed/d_dt_' + idMatch + '_fr_1')}`;
            const response = await fetch(proxyUrl);
            const data = await response.json();
            
            if (data.contents) {
                // Flashscore renvoie des données brutes séparant les infos par des caractères "¬"
                // On extrait les lignes correspondantes aux noms des équipes (marquées par AE÷ pour équipe domicile et AF÷ pour équipe extérieur)
                const segments = data.contents.split('¬');
                let domicile = "";
                let exterieur = "";
                
                segments.forEach(seg => {
                    if (seg.startsWith('AE÷')) domicile = seg.replace('AE÷', '');
                    if (seg.startsWith('AF÷')) exterieur = seg.replace('AF÷', '');
                });

                if (domicile && exterieur) {
                    return `${domicile} ${exterieur}`;
                }
            }
        }

        // 2. GESTION DU FORMAT DE LIEN LONG TRADITIONNEL (ex: /match/tahiti-vanuatu-2026/...) 
        let cleanUrl = url.split('#')[0].split('?')[0];
        if (cleanUrl.endsWith('/')) {
            cleanUrl = cleanUrl.slice(0, -1);
        }
        const pathSegments = urlObj.pathname.split('/').filter(Boolean);
        let matchSegment = pathSegments.find(segment => segment.includes('-') && segment !== 'match');
        
        if (matchSegment) {
            let equipes = matchSegment.replace(/-[a-zA-Z0-9]{8}$/, ''); // Enlève l'ID collé à la fin 
            equipes = equipes.replace(/-/g, ' ').trim(); // Remplace les tirets par des espaces 
            if (equipes.split(' ').length >= 2) {
                return equipes;
            }
        }
    } catch (e) {
        console.error("Erreur lors de l'extraction des équipes :", e);
    }
    return null;
}

async function chercherPolemiques() {
    const url = document.getElementById('urlInput').value.trim();
    const resultsDiv = document.getElementById('results');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    
    if (!url) {
        alert("S'il te plaît, colle un lien valide !");
        return;
    }

    // Réinitialiser l'affichage et afficher la barre de chargement 
    resultsDiv.innerHTML = "";
    progressArea.style.display = 'block';
    
    let score = 0;
    progressBar.style.width = "0%";
    progressLabel.innerText = "Lecture et décodage du lien Flashscore... 0/100";

    // Fonction d'animation de la barre
    const avancerBarre = (cible, message, callback) => {
        let interval = setInterval(() => {
            if (score < cible) {
                score += 1;
                progressBar.style.width = score + "%";
                progressLabel.innerText = `${message} : ${score}/100`;
            } else {
                clearInterval(interval);
                if (callback) callback();
            }
        }, 12);
    };

    // Étape 1 : Analyse de l'URL et requête API Flashscore (0% à 35%)
    avancerBarre(35, "Identification du match via Flashscore", async () => {
        let matchText = await obtenirEquipes(url);

        // Si l'extraction automatique de l'ID ou de l'URL échoue, on bascule sur la saisie manuelle 
        if (!matchText) {
            progressArea.style.display = 'none';
            const fallbackPrompt = prompt("Impossible de lire automatiquement le nom des équipes à partir de cette URL.\n\nS'il te plaît, saisis manuellement le nom du match (ex: Tahiti Vanuatu) :");
            if (fallbackPrompt && fallbackPrompt.trim() !== "") {
                matchText = fallbackPrompt.trim();
                // On relance la barre à l'étape 2 si l'utilisateur a saisi manuellement
                progressArea.style.display = 'block';
                score = 35;
            } else {
                resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Recherche annulée. Entre un nom de match ou un lien valide.</p>";
                return;
            }
        }

        // Étape 2 : Préparation de la recherche Google (35% à 70%)
        avancerBarre(70, `Match trouvé : "${matchText}". Préparation de la recherche`, async () => {
            
            const requeteRecherche = `"${matchText}" AND (arbitrage OR arbitre OR penalty OR carton OR "erreur d'arbitrage" OR "VAR")`; 
            const apiUrl = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(requeteRecherche)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                // Étape 3 : Réception des données (70% à 100%)
                avancerBarre(100, "Traitement des articles et des liens trouvés", () => {
                    setTimeout(() => {
                        progressArea.style.display = 'none';
                        afficherResultats(data, matchText);
                    }, 500);
                });

            } catch (error) {
                console.error(error);
                progressArea.style.display = 'none';
                resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Une erreur est survenue lors de l'appel à l'API de recherche. Vérifie tes clés Google.</p>";
            }
        });
    });
}

function afficherResultats(data, matchText) {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = `<h2>🔗 Liens d'arbitrage trouvés pour : ${matchText}</h2>`;

    if (data.items && data.items.length > 0) {
        data.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'link-card';
            card.innerHTML = `
                <a href="${item.link}" target="_blank">${item.title}</a>
                <p>${item.snippet}</p>
            `;
            resultsDiv.appendChild(card);
        });
    } else {
        resultsDiv.innerHTML += `
            <div style="background-color: #1e293b; padding: 20px; text-align: center; border-radius: 8px;">
                <p>✅ Aucun article ou vidéo mentionnant une polémique d'arbitrage ou une erreur VAR n'a été trouvé pour ce match.</p> 
            </div>`;
    }
}
</script>

</body>
</html>
