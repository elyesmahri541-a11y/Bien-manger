<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Détecteur de Polémiques d'Arbitrage</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 14px; background-color: #0f172a; border: 2px solid #334155; border-radius: 8px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: #38bdf8; outline: none; }
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        
        /* Styles de la barre de progression */
        .progress-container { display: none; margin-top: 20px; background-color: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .progress-text { text-align: center; margin-bottom: 8px; font-weight: bold; color: #38bdf8; font-size: 14px; }
        .progress-bar-bg { width: 100%; background-color: #334155; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fill { width: 0%; background-color: #38bdf8; height: 100%; transition: width 0.1s ease; }

        .results-section { margin-top: 30px; }
        .link-card { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #f43f5e; transition: transform 0.2s; }
        .link-card:hover { transform: translateX(5px); }
        .link-card a { color: #38bdf8; font-weight: bold; text-decoration: none; font-size: 18px; }
        .link-card p { margin: 5px 0 0 0; font-size: 14px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Traqueur de Litiges d'Arbitrage</h1>
    <p class="subtitle">Saisis les équipes et l'année pour trouver toutes les polémiques d'arbitrage</p>

    <input type="text" id="urlInput" placeholder="Exemple de match : Tahiti U16 vs Vanuatu U16..." readonly onclick="chercherPolemiques()">
    <button onclick="chercherPolemiques()">Lancer la recherche</button>

    <div class="progress-container" id="progressArea">
        <div class="progress-text" id="progressLabel">Initialisation... 0/100</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="results-section" id="results"></div>
</div>

<script>
// --- CONFIGURATION DE TON MOTEUR DE RECHERCHE GOOGLE ---
const GOOGLE_API_KEY = "TA_CLE_API_GOOGLE_ICI"; 
const GOOGLE_CX = "TON_ID_DE_MOTEUR_DE_RECHERCHE_ICI"; 

async function chercherPolemiques() {
    const resultsDiv = document.getElementById('results');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    
    resultsDiv.innerHTML = "";

    // 1. Demande de l'équipe et de la catégorie d'âge (ex: Tahiti U16 vs Vanuatu U16)
    const equipesMatch = prompt(
        "Étape 1 sur 2 :\n\nEntrez les équipes et la catégorie d'âge (ex: Tahiti U16 vs Vanuatu U16, ou Tahiti vs Vanuatu) :",
        "Tahiti U16 vs Vanuatu U16"
    );
    
    if (!equipesMatch || equipesMatch.trim() === "") {
        resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Recherche annulée. Vous devez entrer les équipes.</p>";
        return;
    }

    // 2. Demande de l'année précise (ex: 2024, 2018, etc.)
    const anneeMatch = prompt(
        `Étape 2 sur 2 :\n\nQuelle est l'année de ce match (ex: 2024, 2018) ?`,
        new Date().getFullYear()
    );

    if (!anneeMatch || anneeMatch.trim() === "") {
        resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Recherche annulée. Vous devez spécifier une année.</p>";
        return;
    }

    // Combinaison propre des éléments pour la recherche
    const matchRechercheText = `${equipesMatch.trim()} ${anneeMatch.trim()}`;

    // Afficher et lancer la barre de chargement
    progressArea.style.display = 'block';
    let score = 0;
    progressBar.style.width = "0%";
    progressLabel.innerText = "Initialisation de la recherche... 0/100";

    const avancerBarre = (cible, message, callback) => {
        let interval = setInterval(() => {
            if (score < cible) {
                score += 1;
                progressBar.style.width = score + "%";
                progressLabel.innerText = `${message} : ${score}/100`;
            } else {
                clearInterval(interval);
                if (callback) callback();
            }
        }, 10);
    };

    // Étape 1 : Validation des informations (0% à 30%)
    avancerBarre(30, "Configuration des filtres de recherche", () => {
        
        // Étape 2 : Lancement de la recherche Google (30% à 70%)
        avancerBarre(70, `Recherche d'arbitrage pour : "${matchRechercheText}"`, async () => {
            
            // Requête ciblant spécifiquement la catégorie d'âge + l'année saisie + les mots-clés d'arbitrage
            const requeteRecherche = `"${equipesMatch.trim()}" "${anneeMatch.trim()}" AND (arbitrage OR arbitre OR penalty OR carton OR "erreur d'arbitrage" OR "VAR")`;
            const apiUrl = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(requeteRecherche)}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                // Étape 3 : Affichage des résultats (70% à 100%)
                avancerBarre(100, "Traitement des résultats de recherche", () => {
                    setTimeout(() => {
                        progressArea.style.display = 'none';
                        afficherResultats(data, matchRechercheText);
                    }, 400);
                });

            } catch (error) {
                console.error(error);
                progressArea.style.display = 'none';
                resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Erreur de connexion avec l'API Google Search. Vérifie tes identifiants Google.</p>";
            }
        });
    });
}

function afficherResultats(data, matchRechercheText) {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = `<h2>🔗 Liens d'arbitrage trouvés pour : ${matchRechercheText}</h2>`;

    if (data.items && data.items.length > 0) {
        data.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'link-card';
            card.innerHTML = `
                <a href="${item.link}" target="_blank">${item.title}</a>
                <p>${item.snippet}</p>
            `;
            resultsDiv.appendChild(card);
        });
    } else {
        resultsDiv.innerHTML += `
            <div style="background-color: #1e293b; padding: 20px; text-align: center; border-radius: 8px;">
                <p>✅ Aucun article de presse ou vidéo traitant d'un scandale d'arbitrage n'a été trouvé pour cette édition précise.</p>
            </div>`;
    }
}
</script>

</body>
</html>
