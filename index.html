<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détecteur de Polémiques d'Arbitrage</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        
        .box { background-color: #0f172a; padding: 20px; border-radius: 8px; border: 2px solid #334155; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #38bdf8; }
        input[type="text"] { width: 100%; padding: 12px; background-color: #1e293b; border: 1px solid #475569; border-radius: 6px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: #38bdf8; outline: none; }
        
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        
        /* Barre de progression animée */
        .progress-container { display: none; margin-top: 20px; background-color: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .progress-text { text-align: center; margin-bottom: 8px; font-weight: bold; color: #38bdf8; font-size: 14px; }
        .progress-bar-bg { width: 100%; background-color: #334155; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fill { width: 0%; background-color: #38bdf8; height: 100%; transition: width 0.1s ease; }

        .results-section { margin-top: 30px; }
        .link-card { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #f43f5e; transition: transform 0.2s; }
        .link-card:hover { transform: translateX(5px); }
        .link-card a { color: #38bdf8; font-weight: bold; text-decoration: none; font-size: 18px; display: block; margin-bottom: 5px; }
        .link-card p { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.4; }
        .badge { display: inline-block; background-color: #f43f5e; color: white; padding: 2px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; margin-bottom: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Traqueur de Litiges d'Arbitrage</h1>
    <p class="subtitle">Analyse automatique des fautes et erreurs sans aucune API payante</p>

    <div class="box">
        <label for="equipes">1. Équipes et Catégorie (ex: Pays-Bas Argentine, Tahiti U16 Vanuatu U16) :</label>
        <input type="text" id="equipes" placeholder="Ex: Pays-Bas Argentine" value="Pays-Bas Argentine">

        <label for="annee">2. Année du match :</label>
        <input type="text" id="annee" placeholder="Ex: 2022" value="2022">
        
        <button onclick="analyserMatch()">🕵️‍♂️ Scanner et Analyser le match</button>
    </div>

    <div class="progress-container" id="progressArea">
        <div class="progress-text" id="progressLabel">Connexion au réseau... 0/100</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="results-section" id="results"></div>
</div>

<script>
// Liste d'instances publiques de SearxNG pour s'assurer qu'au moins une réponde instantanément
const INSTANCES = [
    "https://searx.be/search",
    "https://searx.space/search",
    "https://search.ononoki.org/search",
    "https://baresearch.org/search"
];

async function analyserMatch() {
    const equipes = document.getElementById('equipes').value.trim();
    const annee = document.getElementById('annee').value.trim();
    const resultsDiv = document.getElementById('results');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');

    if (!equipes || !annee) {
        alert("Remplis les deux cases d'abord !");
        return;
    }

    resultsDiv.innerHTML = "";
    progressArea.style.display = 'block';
    progressBar.style.width = "0%";
    
    // Animation de la barre de progression
    let progress = 0;
    const interval = setInterval(() => {
        if (progress < 90) {
            progress += 2;
            progressBar.style.width = progress + "%";
            progressLabel.innerText = `Recherche d'incidents d'arbitrage en cours... ${progress}/100`;
        }
    }, 150);

    // Formule magique ultra-ciblée d'arbitrage
    const requeteEquipes = equipes.replace(/vs|vs\.|contre/gi, "").trim();
    const requeteFinale = `${requeteEquipes} ${annee} (arbitre OR arbitrage OR penalty OR "carton rouge" OR "erreur" OR polémique OR scandale)`;

    let data = null;
    
    // Essai successif des serveurs gratuits jusqu'à ce qu'un réponde
    for (let instance of INSTANCES) {
        try {
            const url = `${instance}?q=${encodeURIComponent(requeteFinale)}&format=json&engines=google,bing,duckduckgo&language=fr`;
            const response = await fetch(url);
            if (response.ok) {
                data = await response.json();
                break; // Succès ! On arrête la boucle
            }
        } catch (e) {
            console.log(`Serveur ${instance} indisponible, essai du suivant...`);
        }
    }

    clearInterval(interval);
    progressBar.style.width = "100%";
    progressLabel.innerText = "Analyse terminée ! 100/100";
    
    setTimeout(() => {
        progressArea.style.display = 'none';
        
        if (data && data.results && data.results.length > 0) {
            resultsDiv.innerHTML = `<h2>🔗 Polémiques & Litiges trouvés pour : ${equipes} (${annee})</h2>`;
            
            // On filtre pour afficher en priorité les articles contenant des mots d'arbitrage
            const motsClesLitiges = ["arbitre", "arbitrage", "penalty", "rouge", "jaune", "scandale", "faute", "erreur", "polémique", "conteste", "fifa", "var"];
            
            let resultatsFiltres = data.results.filter(item => {
                const texte = (item.title + " " + item.content).toLowerCase();
                return motsClesLitiges.some(mot => texte.includes(mot));
            });

            // Si le filtre est trop strict, on reprend l'ensemble des résultats
            if (resultatsFiltres.length === 0) {
                resultatsFiltres = data.results.slice(0, 5);
            }

            resultatsFiltres.slice(0, 6).forEach(item => {
                const card = document.createElement('div');
                card.className = 'link-card';
                card.innerHTML = `
                    <span class="badge">Incident / Arbitrage</span>
                    <a href="${item.url}" target="_blank">${item.title}</a>
                    <p>${item.content || "Cliquez sur le lien pour lire l'article complet concernant les décisions de ce match."}</p>
                `;
                resultsDiv.appendChild(card);
            });
        } else {
            resultsDiv.innerHTML = `
                <div style="background-color: #1e293b; padding: 20px; text-align: center; border-radius: 8px; border: 1px dashed #f43f5e;">
                    <p>❌ Aucun incident ou polémique d'arbitrage notable n'a été répertorié en ligne pour ce match précis en ${annee}.</p>
                </div>`;
        }
    }, 500);
}
</script>

</body>
</html>
