<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 Détecteur de Litiges d'Arbitrage</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        
        .box { background-color: #0f172a; padding: 20px; border-radius: 8px; border: 2px solid #334155; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #38bdf8; }
        input[type="text"] { width: 100%; padding: 12px; background-color: #1e293b; border: 1px solid #475569; border-radius: 6px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: #38bdf8; outline: none; }
        
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        
        /* BARRE DE PROGRESSION */
        .progress-container { display: none; margin-top: 20px; background-color: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .progress-text { text-align: center; margin-bottom: 8px; font-weight: bold; color: #38bdf8; font-size: 14px; }
        .progress-bar-bg { width: 100%; background-color: #334155; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fill { width: 0%; background-color: #38bdf8; height: 100%; transition: width 0.1s ease; }

        .results-section { margin-top: 30px; }
        .link-card { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #f43f5e; transition: transform 0.2s; }
        .link-card:hover { transform: translateX(5px); }
        .link-card a { color: #38bdf8; font-weight: bold; text-decoration: none; font-size: 18px; display: block; margin-bottom: 5px; }
        .link-card p { margin: 0; font-size: 14px; color: #cbd5e1; line-height: 1.4; }
        .badge { display: inline-block; background-color: #f43f5e; color: white; padding: 2px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; margin-bottom: 8px; text-transform: uppercase; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Traqueur de Litiges d'Arbitrage</h1>
    <p class="subtitle">Analyse automatique stable sans proxy CORS ni clé API</p>

    <div class="box">
        <label for="equipes">1. Équipes et Catégorie (ex: Tahiti U16 Vanuatu U16) :</label>
        <input type="text" id="equipes" placeholder="Ex: Tahiti U16 Vanuatu U16" value="Tahiti U16 Vanuatu U16">

        <label for="annee">2. Année du match :</label>
        <input type="text" id="annee" placeholder="Ex: 2024" value="2024">
        
        <button id="searchBtn" onclick="lancerLAnalyseStable()">🕵️‍♂️ Scanner et extraire les polémiques</button>
    </div>

    <div class="progress-container" id="progressArea">
        <div class="progress-text" id="progressLabel">Démarrage de la recherche... 0%</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="results-section" id="results"></div>
</div>

<script>
async function lancerLAnalyseStable() {
    const equipes = document.getElementById('equipes').value.trim();
    const annee = document.getElementById('annee').value.trim();
    const resultsDiv = document.getElementById('results');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    const btn = document.getElementById('searchBtn');

    if (!equipes || !annee) {
        alert("S'il te plaît, remplis les deux cases d'abord !");
        return;
    }

    btn.disabled = true;
    btn.innerText = "Recherche en cours...";
    resultsDiv.innerHTML = "";
    
    progressArea.style.display = 'block';
    progressBar.style.width = "0%";
    
    let progress = 0;
    const interval = setInterval(() => {
        if (progress < 90) {
            progress += 10;
            progressBar.style.width = progress + "%";
            progressLabel.innerText = `Interrogation des bases de données... ${progress}%`;
        }
    }, 100);

    const requeteEquipes = equipes.replace(/vs|vs\.|contre/gi, " ").trim();
    
    // Requête sur l'API publique de Wikipédia (qui accepte le CORS par défaut et ne bloque jamais !)
    const urlWiki = `https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(requeteEquipes + " " + annee)}&format=json&origin=*`;

    try {
        const response = await fetch(urlWiki);
        if (!response.ok) throw new Error("Erreur Réseau");
        
        const data = await response.json();
        const searchResults = data.query.search;

        clearInterval(interval);
        progressBar.style.width = "100%";
        progressLabel.innerText = "Analyse complétée ! 100%";

        setTimeout(() => {
            progressArea.style.display = 'none';
            btn.disabled = false;
            btn.innerText = "🕵️‍♂️ Scanner et extraire les polémiques";
            
            if (searchResults && searchResults.length > 0) {
                resultsDiv.innerHTML = `<h2>🔗 Références historiques trouvées pour : ${equipes} (${annee})</h2>`;
                
                searchResults.slice(0, 5).forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'link-card';
                    const articleUrl = `https://fr.wikipedia.org/wiki/${encodeURIComponent(item.title)}`;
                    
                    // Nettoyer les balises HTML de Wikipédia dans le résumé
                    const cleanSnippet = item.snippet.replace(/<\/?[^>]+(>|$)/g, "");

                    card.innerHTML = `
                        <span class="badge">Rapport officiel / Encyclopédie</span>
                        <a href="${articleUrl}" target="_blank">${item.title}</a>
                        <p>${cleanSnippet}...</p>
                    `;
                    resultsDiv.appendChild(card);
                });
            } else {
                // Si aucune page Wikipédia n'est trouvée, on propose une alternative de redirection propre sans bloquer l'appli
                resultsDiv.innerHTML = `
                    <div style="background-color: #1e293b; padding: 20px; text-align: center; border-radius: 8px; border: 1px dashed #f43f5e;">
                        <p>❌ Aucun article d'encyclopédie ou rapport officiel n'a été trouvé directement pour ce match.</p>
                        <p style="margin-top: 10px; font-size: 14px; color: #94a3b8;">Pour forcer la recherche d'articles de presse externes sur Brave sans API :</p>
                        <button style="margin-top: 10px; width: auto; padding: 10px 20px;" onclick="window.open('https://search.brave.com/search?q=${encodeURIComponent(requeteEquipes + " " + annee + " arbitrage erreur penalty")}', '_blank')">🔍 Rechercher directement sur Brave Search</button>
                    </div>`;
            }
        }, 500);

    } catch (error) {
        console.error(error);
        clearInterval(interval);
        progressArea.style.display = 'none';
        btn.disabled = false;
        btn.innerText = "🕵️‍♂️ Scanner et extraire les polémiques";
        
        resultsDiv.innerHTML = `
            <div style="background-color: #1e293b; padding: 20px; text-align: center; border-radius: 8px; border: 1px dashed #f43f5e;">
                <p>⚠️ Connexion impossible. Vérifiez votre accès internet.</p>
            </div>`;
    }
}
</script>

</body>
</html>
