<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Détecteur de Polémiques d'Arbitrage</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); text-align: center; }
        h1 { color: #38bdf8; margin-bottom: 5px; }
        p.subtitle { color: #94a3b8; margin-bottom: 25px; }
        
        .box { background-color: #0f172a; padding: 20px; border-radius: 8px; border: 2px solid #334155; margin-bottom: 20px; text-align: left; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #38bdf8; }
        input[type="text"] { width: 100%; padding: 12px; background-color: #1e293b; border: 1px solid #475569; border-radius: 6px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: #38bdf8; outline: none; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; color: #0f172a; border: none; padding: 14px; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        
        /* Boutons personnalisés */
        .btn-google { background-color: #38bdf8; }
        .btn-google:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        .btn-brave { background-color: #fb923c; }
        .btn-brave:hover { background-color: #ea580c; transform: translateY(-1px); }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Traqueur de Litiges d'Arbitrage</h1>
    <p class="subtitle">Génère instantanément la recherche parfaite sans aucune clé API</p>

    <div class="box">
        <label for="equipes">1. Équipes et Catégorie d'âge (ex: Pays-Bas Argentine, Tahiti U16 Vanuatu U16) :</label>
        <input type="text" id="equipes" placeholder="Ex: Tahiti U16 Vanuatu U16">

        <label for="annee">2. Année du match (ex: 2022, 2024, 2018) :</label>
        <input type="text" id="annee" placeholder="Ex: 2024">
        
        <label>3. Choisis ton moteur de recherche pour ouvrir les résultats :</label>
        <div class="btn-group">
            <button class="btn-google" onclick="lancerRecherche('google')">🔍 Chercher sur Google</button>
            <button class="btn-brave" onclick="lancerRecherche('brave')">🦁 Chercher sur Brave Search</button>
        </div>
    </div>
</div>

<script>
function lancerRecherche(moteur) {
    const equipes = document.getElementById('equipes').value.trim();
    const annee = document.getElementById('annee').value.trim();

    if (!equipes) {
        alert("S'il te plaît, écris le nom des équipes !");
        return;
    }
    if (!annee) {
        alert("S'il te plaît, précise l'année du match !");
        return;
    }

    // Nettoyage de la recherche pour enlever les "vs" ou "contre" inutiles qui perturbent les moteurs
    let requeteEquipes = equipes.replace(/vs|vs\.|contre/gi, "").trim();

    // On prépare la formule magique d'arbitrage
    const motsCles = `(arbitre OR arbitrage OR "carton rouge" OR penalty OR scandale OR vol OR polémique)`;
    const requeteFinale = `${requeteEquipes} ${annee} ${motsCles}`;

    let urlRecherche = "";
    
    if (moteur === 'google') {
        urlRecherche = `https://www.google.com/search?q=${encodeURIComponent(requeteFinale)}`;
    } else if (moteur === 'brave') {
        urlRecherche = `https://search.brave.com/search?q=${encodeURIComponent(requeteFinale)}`;
    }

    // Ouvre les résultats instantanément dans un nouvel onglet !
    window.open(urlRecherche, '_blank');
}
</script>

</body>
</html>
