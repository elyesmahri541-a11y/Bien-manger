<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Détecteur de Polémiques d'Arbitrage</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; max-width: 800px; margin: 40px auto; padding: 20px; background-color: #0f172a; color: #f8fafc; }
        .container { background-color: #1e293b; padding: 30px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        h1 { color: #38bdf8; text-align: center; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #94a3b8; margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 14px; background-color: #0f172a; border: 2px solid #334155; border-radius: 8px; color: #fff; font-size: 16px; box-sizing: border-box; margin-bottom: 15px; }
        input[type="text"]:focus { border-color: #38bdf8; outline: none; }
        button { background-color: #38bdf8; color: #0f172a; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: all 0.2s; }
        button:hover { background-color: #0ea5e9; transform: translateY(-1px); }
        
        /* Styles de la barre de progression */
        .progress-container { display: none; margin-top: 20px; background-color: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; }
        .progress-text { text-align: center; margin-bottom: 8px; font-weight: bold; color: #38bdf8; font-size: 14px; }
        .progress-bar-bg { width: 100%; background-color: #334155; border-radius: 10px; height: 12px; overflow: hidden; }
        .progress-bar-fill { width: 0%; background-color: #38bdf8; height: 100%; transition: width 0.1s ease; }

        .results-section { margin-top: 30px; }
        .link-card { background-color: #334155; padding: 15px; border-radius: 8px; margin-bottom: 12px; border-left: 4px solid #f43f5e; transition: transform 0.2s; }
        .link-card:hover { transform: translateX(5px); }
        .link-card a { color: #38bdf8; font-weight: bold; text-decoration: none; font-size: 18px; }
        .link-card p { margin: 5px 0 0 0; font-size: 14px; color: #cbd5e1; }
    </style>
</head>
<body>

<div class="container">
    <h1>🚨 Traqueur de Litiges d'Arbitrage</h1>
    <p class="subtitle">Colle un lien Flashscore pour trouver toutes les polémiques du match sur le web</p>

    <input type="text" id="urlInput" placeholder="Colle le lien Flashscore ici... (ex: https://www.flashscore.fr/match/xxxx/)">
    <button onclick="chercherPolemiques()">Scanner le Web</button>

    <div class="progress-container" id="progressArea">
        <div class="progress-text" id="progressLabel">Initialisation... 0/100</div>
        <div class="progress-bar-bg">
            <div class="progress-bar-fill" id="progressBar"></div>
        </div>
    </div>

    <div class="results-section" id="results"></div>
</div>

<script>
// --- CONFIGURATION GRATUITE DE TON MOTEUR DE RECHERCHE ---
// Remplace ces valeurs par tes clés gratuites obtenues sur Google
const GOOGLE_API_KEY = "TA_CLE_API_GOOGLE_ICI"; 
const GOOGLE_CX = "TON_ID_DE_MOTEUR_DE_RECHERCHE_ICI"; 

// Fonction pour extraire le nom des équipes à partir d'une URL Flashscore standard
function extraireEquipesDepuisUrl(url) {
    try {
        const urlObj = new URL(url);
        const pathSegments = urlObj.pathname.split('/').filter(Boolean);
        
        let matchSegment = pathSegments.find(segment => segment.includes('-'));
        if (matchSegment) {
            let equipes = matchSegment.replace(/-/g, ' ');
            equipes = equipes.replace(/[a-zA-Z0-9]{8}$/, '').trim();
            return equipes;
        }
    } catch (e) {
        console.error("Erreur d'analyse d'URL :", e);
    }
    return null;
}

async function chercherPolemiques() {
    const url = document.getElementById('urlInput').value.trim();
    const resultsDiv = document.getElementById('results');
    const progressArea = document.getElementById('progressArea');
    const progressBar = document.getElementById('progressBar');
    const progressLabel = document.getElementById('progressLabel');
    
    if (!url) {
        alert("S'il te plaît, colle un lien valide !");
        return;
    }

    const matchText = extraireEquipesDepuisUrl(url);
    if (!matchText) {
        resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Impossible de lire le nom des équipes dans ce lien. Essaie d'entrer directement 'Equipe A vs Equipe B' à la place.</p>";
        return;
    }

    // Réinitialiser l'affichage et lancer l'animation de chargement
    resultsDiv.innerHTML = "";
    progressArea.style.display = 'block';
    
    let score = 0;
    progressBar.style.width = "0%";
    progressLabel.innerText = "Lecture du lien Flashscore... 0/100";

    // Fonction pour animer la barre de progression
    const avancerBarre = (cible, message, callback) => {
        let interval = setInterval(() => {
            if (score < cible) {
                score += 1;
                progressBar.style.width = score + "%";
                progressLabel.innerText = `${message} : ${score}/100`;
            } else {
                clearInterval(interval);
                if (callback) callback();
            }
        }, 15); // Vitesse de l'animation
    };

    // Étape 1 : Analyse de l'URL (0 à 30%)
    avancerBarre(30, "Extraction des équipes", () => {
        // Étape 2 : Préparation des requêtes Google (30 à 65%)
        avancerBarre(65, "Création des requêtes d'arbitrage", async () => {
            
            // On prépare l'appel API en arrière-plan pendant que la barre continue de progresser
            const requeteRecherche = `"${matchText}" AND (arbitrage OR arbitre OR penalty OR carton OR "erreur d'arbitrage" OR "VAR")`;
            const apiUrl = `https://www.googleapis.com/customsearch/v1?key=${GOOGLE_API_KEY}&cx=${GOOGLE_CX}&q=${encodeURIComponent(requeteRecherche)}`;
            
            try {
                const response = await fetch(apiUrl);
                const data = await response.json();

                // Étape 3 : Réception et rendu des résultats (65 à 100%)
                avancerBarre(100, "Analyse des données trouvées", () => {
                    // Cacher la barre après une courte pause à 100%
                    setTimeout(() => {
                        progressArea.style.display = 'none';
                        afficherResultats(data, matchText);
                    }, 500);
                });

            } catch (error) {
                console.error(error);
                progressArea.style.display = 'none';
                resultsDiv.innerHTML = "<p style='color:#f43f5e;'>Une erreur est survenue lors de l'appel à l'API Google. Vérifie tes clés.</p>";
            }
        });
    });
}

function afficherResultats(data, matchText) {
    const resultsDiv = document.getElementById('results');
    resultsDiv.innerHTML = `<h2>🔗 Liens trouvés pour : ${matchText}</h2>`;

    if (data.items && data.items.length > 0) {
        data.items.forEach(item => {
            const card = document.createElement('div');
            card.className = 'link-card';
            card.innerHTML = `
                <a href="${item.link}" target="_blank">${item.title}</a>
                <p>${item.snippet}</p>
            `;
            resultsDiv.appendChild(card);
        });
    } else {
        resultsDiv.innerHTML += `
            <div style="background-color: #1e293b; padding: 20px; text-align: center; border-radius: 8px;">
                <p>✅ Aucun article ou vidéo mentionnant une polémique d'arbitrage ou une erreur VAR n'a été trouvé pour ce match.</p>
            </div>`;
    }
}
</script>

</body>
</html>
